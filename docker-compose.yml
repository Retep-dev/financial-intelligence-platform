services:

  postgres:
    image: postgres:16

    container_name: financial_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: financial_intelligence

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: financial_redis

    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.18.0

    container_name: financial_qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
