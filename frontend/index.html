<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Intelligence Platform</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <h1>Financial Intelligence Platform</h1>
            </div>
            <div class="status" id="statusIndicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Checking...</span>
            </div>
        </header>

        <main class="app-main">
            <section class="panel upload-panel">
                <h2>Upload Documents</h2>
                <div class="upload-zone" id="uploadZone">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p class="upload-title">Drag & drop files here</p>
                    <p class="upload-hint">or click to browse</p>
                    <input type="file" id="fileInput" class="file-input" accept=".pdf,.docx,.txt,.csv,.xlsx">
                </div>

                <div class="upload-status" id="uploadStatus"></div>

                <div class="documents-section">
                    <h3>Recent uploads</h3>
                    <ul class="document-list" id="documentList">
                        <li class="document-empty">No documents uploaded yet</li>
                    </ul>
                </div>
            </section>

            <section class="panel chat-panel">
                <h2>Chat</h2>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <h3>Welcome</h3>
                        <p>Upload a financial document, then ask questions about its contents. The assistant will cite its sources.</p>
                    </div>
                </div>

                <form class="chat-input-area" id="chatForm">
                    <input
                        type="text"
                        id="chatInput"
                        class="chat-input"
                        placeholder="Ask something about your documents..."
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="send-button" id="sendButton">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
